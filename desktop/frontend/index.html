<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#22ccaa" />
    <title>qxp</title>
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/icon-512.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <style>
      /* Paint the webview black before any CSS bundle loads so the OS window
       * (also set to #000 in tauri.conf.json) is never visibly covered by an
       * unstyled white frame during startup. reset.css then overrides this
       * with `var(--color-bg)` once the bundle parses. */
      html,
      body {
        background: #000;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/app.ts"></script>
  </body>
</html>
