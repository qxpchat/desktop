name: Release

# Build qxp for macOS, Windows + Linux and attach the bundles to a GitHub
# release whenever a version tag (e.g. 0.7.0) is pushed.
on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest   # Apple Silicon (.dmg / .app)
          - platform: windows-latest # x86_64 (.msi / .exe nsis)
          - platform: ubuntu-22.04   # x86_64 (.deb / .AppImage)

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch submodules
        # Submodules pin SSH URLs (deltachat-core-rust over git@github.com,
        # nested submodules over ssh://git@codeberg.org); CI has no SSH key,
        # so rewrite both to https before init.
        run: |
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git config --global url."https://codeberg.org/".insteadOf "ssh://git@codeberg.org/"
          git submodule update --init --recursive

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libssl-dev \
            patchelf \
            build-essential \
            file

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Import Apple signing certificate
        if: matrix.platform == 'macos-latest'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          if [ -z "$APPLE_CERTIFICATE" ]; then
            echo "ERROR: APPLE_CERTIFICATE secret is empty"
            exit 1
          fi
          printf '%s' "$APPLE_CERTIFICATE" | base64 --decode > cert.p12
          ls -la cert.p12
          file cert.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import cert.p12 -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" build.keychain
          rm cert.p12

      - name: Build + release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Baked into the Vite bundle at build time. Falls back to Giphy's
          # rate-limited public beta key when unset, which is fine for PR
          # previews but not for shipped releases.
          VITE_GIPHY_API_KEY: ${{ secrets.VITE_GIPHY_API_KEY }}
          # Apple code signing + notarization (macOS only; ignored elsewhere).
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: src-tauri
          tagName: ${{ github.ref_name }}
          releaseName: qxp ${{ github.ref_name }}
          releaseDraft: true
          prerelease: false
