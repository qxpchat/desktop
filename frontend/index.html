<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#22ccaa" />
    <title>qxp</title>
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/icon-512.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <style>
      /* Match the Tauri window bg (set in tauri.conf.json) so there's no
       * unstyled white frame before reset.css applies `var(--color-bg)`.
       * `prefers-color-scheme` covers light/dark OS settings; explicit
       * theme prefs from localStorage briefly mismatch but only for one
       * frame before the JS bundle runs. */
      html,
      body {
        background: #fafafa;
      }
      @media (prefers-color-scheme: dark) {
        html,
        body {
          /* Pre-computed `color-mix(in srgb, #6b6b72 14%, #000)` —
           * matches `--color-bg` in theme.css. Update both together. */
          background: #0f0f10;
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/app.ts"></script>
  </body>
</html>
